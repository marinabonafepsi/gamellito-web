<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamellito — Geladeira</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #1a0f3a 0%, #2b1654 100%);
      font-family: 'Segoe UI', sans-serif;
      padding: 8px;
    }
    h1 {
      color: #ffd66b;
      font-size: clamp(1rem, 4vw, 1.5rem);
      margin-bottom: 8px;
      text-align: center;
    }
    .hud {
      color: rgba(255,255,255,0.95);
      font-size: clamp(1rem, 4vw, 1.25rem);
      margin-bottom: 12px;
      text-align: center;
    }
    .stage {
      position: relative;
      width: min(96vw, calc(85vh * 1.55));
      max-height: 85vh;
      aspect-ratio: 155 / 100;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(168,129,192,0.45);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      background: #2b1654 url("/demo-game/room-bg.png") center center / cover no-repeat;
    }
    .fridge-img {
      position: absolute;
      left: 22%;
      bottom: 6%;
      width: 14%;
      max-height: 42%;
      object-fit: contain;
      object-position: bottom center;
      pointer-events: none;
      z-index: 2;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
      transition: opacity 0.2s;
    }
    .fridge-img.open { opacity: 0.4; }
    .hitbox {
      position: absolute;
      left: 14%;
      bottom: 4%;
      width: 22%;
      min-width: 48px;
      min-height: 48px;
      max-width: 200px;
      height: 48%;
      max-height: 280px;
      z-index: 5;
      border: 2px solid transparent;
      border-radius: 16px;
      background: transparent;
      cursor: pointer;
    }
    .hitbox:hover, .hitbox:focus-visible {
      border-color: rgba(255,255,255,0.35);
      outline: none;
    }
    .hitbox:focus-visible {
      box-shadow: 0 0 0 3px rgba(255,138,60,0.8);
    }
    .panel {
      display: none;
      position: absolute;
      left: 12%;
      bottom: 12%;
      width: min(52%, 280px);
      max-height: 55%;
      z-index: 6;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.96);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .panel.open { display: block; }
    .panel-inner {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #e9d5ff;
    }
    .panel-inner img.bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .snacks {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    .snacks button {
      min-height: 44px;
      padding: 8px 12px;
      border: none;
      border-radius: 9999px;
      background: #ff8a3c;
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
    .gamellito {
      position: absolute;
      left: 50%;
      bottom: 7%;
      transform: translateX(-50%);
      width: min(22%, 120px);
      max-width: 28vmin;
      z-index: 3;
      pointer-events: none;
    }
    .gamellito img {
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.35));
    }
    .msg {
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
      margin-top: 12px;
      text-align: center;
      max-width: 400px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Geladeira do Gamellito</h1>
  <p class="hud">Estrelas: <span id="score">0</span> · Aberturas: <span id="opens">0</span></p>

  <div class="stage" id="stage">
    <img class="fridge-img" id="fridgeImg" src="/assets/geladeira.svg" alt="">
    <button type="button" class="hitbox" id="fridgeBtn" aria-expanded="false" aria-label="Abrir ou fechar a geladeira"></button>
    <div class="panel" id="panel" role="region" aria-label="Interior da geladeira">
      <div class="panel-inner">
        <img class="bg" src="/assets/app-ui/UIFridgePageImage.png" alt="" onerror="this.src='/assets/app-ui/geladeira.png'">
        <div class="snacks" id="snacks"></div>
      </div>
    </div>
    <div class="gamellito">
      <img src="/assets/gamellito-feliz-mao-na-barriga.svg" alt="Gamellito">
    </div>
  </div>

  <p class="msg" id="tip">Toque na área da geladeira para abrir. Escolha um lanche. Toque de novo para fechar.</p>

  <script>
    (function() {
      var open = false;
      var score = 0;
      var opens = 0;
      var btn = document.getElementById('fridgeBtn');
      var panel = document.getElementById('panel');
      var fridgeImg = document.getElementById('fridgeImg');
      var scoreEl = document.getElementById('score');
      var opensEl = document.getElementById('opens');
      var snacks = ['Banana', 'Água', 'Sanduíche', 'Iogurte'];
      var snackBox = document.getElementById('snacks');
      snacks.forEach(function(label) {
        var b = document.createElement('button');
        b.type = 'button';
        b.textContent = label;
        b.addEventListener('click', function() {
          document.getElementById('tip').textContent = 'Boa escolha: ' + label + '!';
        });
        snackBox.appendChild(b);
      });

      btn.addEventListener('click', function() {
        open = !open;
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        panel.classList.toggle('open', open);
        fridgeImg.classList.toggle('open', open);
        if (open) {
          opens++;
          score++;
          scoreEl.textContent = String(score);
          opensEl.textContent = String(opens);
          document.getElementById('tip').textContent = 'Escolha um lanche! Toque na geladeira de novo para fechar.';
        } else {
          document.getElementById('tip').textContent = 'Toque na geladeira para abrir de novo!';
        }
      });
    })();
  </script>
</body>
</html>
